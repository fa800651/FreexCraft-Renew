name: FreeXCraft 续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'   # 每3小时执行一次

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/FreexCraft-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/freexcraft_renew.sh freexcraft_renew.sh

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🔧 执行续期
        env:
          FXC_ACCOUNT: ${{ secrets.FXC_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository_owner }}/FreexCraft-Renew-Private
        run: bash freexcraft_renew.sh

      - name: 📤 推回私库（如有 hash 更新）
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          cp freexcraft_renew.sh private/freexcraft_renew.sh
          cd private
          if ! git diff --quiet; then
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add freexcraft_renew.sh
            git commit -m "🔄 自动更新 next-action hash"
            git push "https://${PRIVATE_REPO_TOKEN}@github.com/${{ github.repository_owner }}/FreexCraft-Renew-Private.git" HEAD
            echo "✅ 已推回私库"
          else
            echo "ℹ️ hash 无变化，无需推送"
          fi
